<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Espace formateur</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f7fb;
  padding: 40px;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  max-width: 700px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(11, 46, 89, 0.08);
}

.status-ok {
  color: green;
  font-weight: bold;
}

.status-bad {
  color: red;
  font-weight: bold;
}

button {
  padding: 12px 16px;
  background: #1f6feb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
}

h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="card" id="app">
Chargement...
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://zsraqxzneghkzaozzuci.supabase.co",
  "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
);

const emailParam = new URLSearchParams(window.location.search).get("email");
const cleanEmail = emailParam ? emailParam.trim().toLowerCase() : "";

async function load() {
  if (!cleanEmail) {
    document.getElementById("app").innerHTML = "Email manquant";
    return;
  }

  const { data, error } = await supabase
    .from("trainers")
    .select("*")
    .eq("email", cleanEmail)
    .single();

  if (error || !data) {
    console.error("Erreur formateur:", error);
    document.getElementById("app").innerHTML = "Formateur introuvable";
    return;
  }

  const today = new Date();

  const certExpiry = data.certification_expiry ? new Date(data.certification_expiry) : null;
  const affExpiry = data.affiliation_end ? new Date(data.affiliation_end) : null;

  const certValid = certExpiry ? certExpiry >= today : false;
  const affValid = affExpiry ? affExpiry >= today : false;

  document.getElementById("app").innerHTML = `
    <h2>${data.first_name || ""} ${data.last_name || ""}</h2>

    <p>
      Certification :
      <span class="${certValid ? 'status-ok' : 'status-bad'}">
        ${certValid ? 'Valide' : 'Expirée'}
      </span>
    </p>

    <p>Date de certification : ${data.certification_date || "—"}</p>
    <p>Expire le : ${data.certification_expiry || "—"}</p>

    <hr>

    <p>
      Affiliation :
      <span class="${affValid ? 'status-ok' : 'status-bad'}">
        ${affValid ? 'Active' : 'Expirée'}
      </span>
    </p>

    <p>Début affiliation : ${data.affiliation_start || "—"}</p>
    <p>Expire le : ${data.affiliation_end || "—"}</p>

    ${
      !affValid
        ? `<button onclick="alert('Paiement affiliation à venir')">
            Renouveler mon affiliation
          </button>`
        : ""
    }
  `;
}

load();
</script>

</body>
</html>
