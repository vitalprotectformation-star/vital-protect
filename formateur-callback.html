<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion formateur — VITAL PROTECT</title>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #dbe4f0;
      --text: #142033;
      --muted: #667085;
      --shadow: 0 10px 30px rgba(11, 46, 89, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: center;
    }

    .logo {
      margin: 0 auto 18px;
      width: fit-content;
    }

    .logo img {
      width: min(220px, 55vw);
      height: auto;
      display: block;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .debug {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="VITAL PROTECT" />
    </div>

    <h1>Connexion en cours...</h1>
    <p id="message">Validation de votre accès sécurisé.</p>

    <div class="debug" id="debug" style="display:none;"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://zsraqxzneghkzaozzuci.supabase.co",
      "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
    );

    const message = document.getElementById("message");
    const debug = document.getElementById("debug");

    function showDebug(content) {
      debug.style.display = "block";
      debug.textContent = content;
    }

    async function handle() {
      try {
        message.textContent = "Finalisation de votre connexion...";

        const url = new URL(window.location.href);
        const code = url.searchParams.get("code");

        if (code) {
          const { error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);

          if (exchangeError) {
            console.error("Erreur exchangeCodeForSession:", exchangeError);
            message.textContent = "Échec de connexion. Redirection vers la page de connexion...";
            showDebug(exchangeError.message);

            setTimeout(() => {
              window.location.href = "/formateur-login.html";
            }, 1800);
            return;
          }
        }

        await new Promise(resolve => setTimeout(resolve, 700));

        const {
          data: { session }
        } = await supabase.auth.getSession();

        if (!session?.user?.email) {
          message.textContent = "Aucune session détectée. Redirection...";
          setTimeout(() => {
            window.location.href = "/formateur-login.html";
          }, 1500);
          return;
        }

        message.textContent = "Connexion réussie. Redirection vers votre espace formateur...";
        setTimeout(() => {
          window.location.href = "/espace-formateur.html";
        }, 900);
      } catch (error) {
        console.error("Erreur callback formateur:", error);
        message.textContent = "Erreur de connexion. Redirection...";
        showDebug(error.message || "Erreur inconnue");

        setTimeout(() => {
          window.location.href = "/formateur-login.html";
        }, 1800);
      }
    }

    handle();
  </script>
</body>
</html>
