<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VITAL PROTECT</title>

  <style>
    :root {
      --navy: #0b2e59;
      --navy-dark: #08203d;
      --blue: #1f6feb;
      --blue-soft: #eaf2ff;
      --text: #142033;
      --muted: #667085;
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #dbe4f0;
      --shadow: 0 10px 30px rgba(11, 46, 89, 0.08);
      --success: #0f9d58;
      --warning-bg: #fff4df;
      --warning-text: #b7791f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      background: linear-gradient(135deg, var(--navy-dark), var(--navy));
      color: white;
      padding: 16px 0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
    }

    /* 🔥 LOGO TRIPLÉ */
    .brand img {
      height: 162px;
      width: auto;
      display: block;
    }

    .brand-text {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 12px;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255,255,255,0.12);
    }

    .hero {
      padding: 56px 0 28px;
    }

    .hero-card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .hero-badge {
      display: inline-block;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: 2.6rem;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 780px;
    }

    .hero-actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    section {
      padding: 24px 0 34px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 2rem;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .stages-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .stage-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    footer {
      margin-top: 38px;
      background: var(--navy-dark);
      color: rgba(255,255,255,0.88);
      padding: 28px 0;
    }

    footer p {
      margin: 0;
      text-align: center;
    }

    @media (max-width: 980px) {
      .stages-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .brand-text {
        font-size: 1.2rem;
      }

      /* 🔥 LOGO TRIPLÉ MOBILE */
      .brand img {
        height: 132px;
      }

      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        width: 100%;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a href="/index.html" class="brand">
      <img src="/logo.png" alt="VITAL PROTECT" />
      <span class="brand-text">VITAL PROTECT</span>
    </a>

    <nav class="nav-links">
      <a href="/index.html">Accueil</a>
      <a href="#stages">Stages</a>
      <a href="/devenir-formateur.html">Devenir formateur</a>
    </nav>
  </div>
</header>

</body>
</html>
