<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VITAL PROTECT</title>

<style>
:root {
  --navy:#0b2e59;
  --navy-dark:#08203d;
  --blue:#1f6feb;
  --blue-soft:#eaf2ff;
  --text:#142033;
  --muted:#667085;
  --bg:#f4f7fb;
  --card:#ffffff;
  --border:#dbe4f0;
  --success:#0f9d58;
  --warning:#b7791f;
  --shadow:0 10px 30px rgba(11,46,89,0.08);
}

body {margin:0;font-family:Arial;background:var(--bg);color:var(--text);}
.container {width:min(1180px,calc(100% - 32px));margin:auto;}

header {
  background:linear-gradient(135deg,var(--navy-dark),var(--navy));
  color:white;padding:20px 0;
}
.header-inner {display:flex;justify-content:space-between;align-items:center;}
.brand {font-size:2rem;font-weight:800;}
.nav-links a {
  color:white;text-decoration:none;margin-left:15px;
}

.hero {padding:60px 0;}
.hero-card {
  background:white;padding:30px;border-radius:20px;
}
.hero-actions a {
  display:inline-block;margin:10px 5px;
  padding:12px 16px;border-radius:10px;
  text-decoration:none;font-weight:700;
}
.btn-primary {background:var(--blue);color:white;}
.btn-secondary {border:1px solid var(--border);color:var(--navy);}

.stages-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.stage-card {
  background:white;border-radius:20px;
  padding:20px;box-shadow:var(--shadow);
}

.stage-price {font-weight:800;font-size:1.3rem;}

button {
  background:var(--navy);color:white;
  border:none;padding:10px 14px;border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="brand">VITAL PROTECT</div>
    <nav class="nav-links">
      <a href="#stages">Stages</a>
      <a href="#reservation">Réservation</a>
      <a href="/devenir-formateur.html">Devenir formateur</a>
      <a href="/sessions-formateur.html">Sessions formateur</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <div class="hero-card">
      <h1>Réservez un stage de self-défense</h1>
      <p>Simple, rapide et sécurisé.</p>

      <div class="hero-actions">
        <a href="#stages" class="btn-primary">Voir les stages</a>
        <a href="#reservation" class="btn-secondary">Réserver</a>
        <a href="/devenir-formateur.html" class="btn-secondary">Devenir formateur</a>
      </div>
    </div>
  </div>
</section>

<section id="stages">
  <div class="container">
    <h2>Stages disponibles</h2>
    <div id="stagesContainer" class="stages-grid"></div>
  </div>
</section>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://zsraqxzneghkzaozzuci.supabase.co",
  "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
);

const container = document.getElementById("stagesContainer");

function formatPrice(p){
  return p + " €";
}

async function loadStages(){
  const {data,error} = await supabase
    .from("stages")
    .select("*")
    .eq("status","published");

  if(error){
    container.innerHTML = "Erreur chargement";
    return;
  }

  container.innerHTML = data.map(stage => `
    <div class="stage-card">
      <h3>${stage.title}</h3>
      <p>${stage.city}</p>
      <div class="stage-price">${formatPrice(stage.price)}</div>
      <button>Réserver</button>
    </div>
  `).join("");
}

loadStages();
</script>

</body>
</html>
