<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://zsraqxzneghkzaozzuci.supabase.co",
    "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
  );

  const form = document.getElementById("loginForm");
  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  function setStatus(message, type = "") {
    status.textContent = message;
    status.className = `status${type ? " " + type : ""}`;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim().toLowerCase();

    if (!email) {
      setStatus("Veuillez saisir votre email.", "error");
      return;
    }

    submitBtn.disabled = true;
    setStatus("Envoi du lien de connexion...");

    try {
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${window.location.origin}/auth-callback.html`
        }
      });

      if (error) {
        console.error("Erreur OTP admin:", error);
        setStatus(`Erreur : ${error.message}`, "error");
        submitBtn.disabled = false;
        return;
      }

      setStatus("✅ Lien envoyé. Vérifiez votre email.", "success");
      form.reset();
    } catch (error) {
      console.error("Erreur login admin:", error);
      setStatus("Erreur réseau ou serveur.", "error");
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
