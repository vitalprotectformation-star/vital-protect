<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Espace formateur</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f7fb;
  padding: 40px;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  max-width: 720px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(11, 46, 89, 0.08);
}

.status-ok {
  color: green;
  font-weight: bold;
}

.status-bad {
  color: red;
  font-weight: bold;
}

button {
  padding: 12px 16px;
  background: #1f6feb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
}

h2 {
  margin-top: 0;
}

.debug {
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  background: #f8fbff;
  border: 1px solid #dbe4f0;
  color: #667085;
  font-size: 14px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="card" id="app">
Chargement...
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://zsraqxzneghkzaozzuci.supabase.co",
  "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
);

const emailParam = new URLSearchParams(window.location.search).get("email");
const cleanEmail = emailParam ? emailParam.trim().toLowerCase() : "";

function normalize(value) {
  return String(value || "").trim().toLowerCase();
}

async function load() {
  const app = document.getElementById("app");

  if (!cleanEmail) {
    app.innerHTML = `
      <h2>Email manquant</h2>
      <div class="debug">Aucun paramètre "email" trouvé dans l’URL.</div>
    `;
    return;
  }

  const { data, error } = await supabase
    .from("trainers")
    .select("*");

  if (error) {
    console.error("Erreur Supabase:", error);
    app.innerHTML = `
      <h2>Erreur de chargement</h2>
      <div class="debug">Supabase error: ${error.message}</div>
    `;
    return;
  }

  const trainers = data || [];
  const trainer = trainers.find(t => normalize(t.email) === cleanEmail);

  if (!trainer) {
    console.error("Formateur introuvable. Email URL:", cleanEmail, "Emails DB:", trainers.map(t => t.email));
    app.innerHTML = `
      <h2>Formateur introuvable</h2>
      <div class="debug">
Email demandé : ${cleanEmail}

Emails trouvés en base :
${trainers.map(t => `- ${t.email}`).join("\n") || "Aucun"}
      </div>
    `;
    return;
  }

  const today = new Date();

  const certExpiry = trainer.certification_expiry ? new Date(trainer.certification_expiry) : null;
  const affExpiry = trainer.affiliation_end ? new Date(trainer.affiliation_end) : null;

  const certValid = certExpiry ? certExpiry >= today : false;
  const affValid = affExpiry ? affExpiry >= today : false;

  app.innerHTML = `
    <h2>${trainer.first_name || ""} ${trainer.last_name || ""}</h2>

    <p>
      Certification :
      <span class="${certValid ? 'status-ok' : 'status-bad'}">
        ${certValid ? 'Valide' : 'Expirée'}
      </span>
    </p>

    <p>Date de certification : ${trainer.certification_date || "—"}</p>
    <p>Expire le : ${trainer.certification_expiry || "—"}</p>

    <hr>

    <p>
      Affiliation :
      <span class="${affValid ? 'status-ok' : 'status-bad'}">
        ${affValid ? 'Active' : 'Expirée'}
      </span>
    </p>

    <p>Début affiliation : ${trainer.affiliation_start || "—"}</p>
    <p>Expire le : ${trainer.affiliation_end || "—"}</p>

    ${
      !affValid
        ? `<button onclick="alert('Paiement affiliation à venir')">
            Renouveler mon affiliation
          </button>`
        : ""
    }

    <div class="debug">
Email URL : ${cleanEmail}
Email trouvé : ${trainer.email}
ID formateur : ${trainer.id}
    </div>
  `;
}

load();
</script>

</body>
</html>
