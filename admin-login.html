<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Admin — VITAL PROTECT</title>
  <style>
    :root {
      --navy: #0b2e59;
      --navy-dark: #08203d;
      --blue: #1f6feb;
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #dbe4f0;
      --text: #142033;
      --muted: #667085;
      --shadow: 0 10px 30px rgba(11, 46, 89, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(480px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--blue);
      color: white;
      width: 100%;
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      min-height: 22px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion admin</h1>
    <p>Connectez-vous avec votre email autorisé pour accéder au cockpit VITAL PROTECT.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email admin</label>
        <input type="email" id="email" required placeholder="admin@vital-protect.fr" />
      </div>

      <button type="submit" class="btn">Recevoir mon lien de connexion</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://zsraqxzneghkzaozzuci.supabase.co",
      "sb_publishable_VlTpYjzJ3DKpFA1Un_EFHQ_FW-mYK4U"
    );

    const form = document.getElementById("loginForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      status.textContent = "Vérification de l'accès...";

      const { data: adminUser, error: adminError } = await supabase
        .from("admin_users")
        .select("*")
        .eq("email", email)
        .maybeSingle();

      if (adminError) {
        console.error(adminError);
        status.textContent = "Erreur lors de la vérification admin.";
        return;
      }

      if (!adminUser) {
        status.textContent = "Accès refusé : cet email n'est pas autorisé.";
        return;
      }

      const { error } = await supabase.auth.signInWithOtp({
  email,
  options: {
    emailRedirectTo: `${window.location.origin}/auth/callback.html`
  }
});

      if (error) {
        console.error(error);
        status.textContent = "Erreur lors de l'envoi du lien de connexion.";
        return;
      }

      status.textContent = "Lien de connexion envoyé par email.";
    });
  </script>
</body>
</html>
